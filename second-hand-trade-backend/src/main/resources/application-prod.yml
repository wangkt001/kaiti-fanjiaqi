# 生产环境配置
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:yujianhaowu}?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:yujian_app}
    password: ${DB_PASSWORD:your_password}

logging:
  level:
    root: WARN
    com.campus.yujianhaowu: INFO
  file:
    name: /var/logs/yujianhaowu-backend.log

file:
  upload:
    path: /data/uploads/yujianhaowu
  url:
    prefix: https://cdn.yujianhaowu.com/files
