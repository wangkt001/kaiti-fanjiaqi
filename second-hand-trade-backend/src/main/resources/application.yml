server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    threads:
      max: 200
      min-spare: 10
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

spring:
  application:
    name: yujianhaowu-backend

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3306/employment_fanjiaqi?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      auto-commit: true
      idle-timeout: 30000
      pool-name: YujianHaoWuHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      encoding: UTF-8

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2MB

  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    serialization:
      write-dates-as-timestamps: false

  task:
    execution:
      pool:
        core-size: 5
        max-size: 10
        queue-capacity: 100
      thread-name-prefix: async-task-

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.campus.yujianhaowu.model.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    lazy-loading-enabled: false
    aggressive-lazy-loading: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-underline: true
    banner: false
  # 启用自动更新表结构
  schema: classpath:schema.sql

jwt:
  secret: yujianhaowu2026henanculturalcreativeproductsplatform
  expiration: 604800000
  refresh-expiration: 2592000000
  header: Authorization
  prefix: Bearer

knife4j:
  enable: true
  setting:
    language: zh-CN
    swagger-model-name: 实体类
  production: false
  basic:
    enable: false
    username: admin
    password: admin

logging:
  level:
    root: INFO
    com.campus.yujianhaowu: DEBUG
    org.springframework.web: DEBUG
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/yujianhaowu-backend.log
    max-size: 10MB
    max-history: 30

file:
  upload:
    path: /data/uploads/yujianhaowu
    max-size: 10485760
    allowed-types: image/jpeg,image/png,image/gif,image/webp
  url:
    prefix: http://localhost:8080/api/files
